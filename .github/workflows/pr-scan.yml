name: AI-SAST PR Scan

# Configuration:
# - Set repository variable AI_SAST_SEVERITY to customize which severities are posted as PR comments
#   Options: "critical", "high", "medium", "low", "info"
#   Default: "critical,high"
#   Examples:
#     - "critical,high,medium" - Post critical, high, and medium findings
#     - "critical" - Post only critical findings
#     - "critical,high,medium,low" - Post all findings except info
#
# To set: Repository Settings → Secrets and variables → Actions → Variables → New repository variable

on:
  pull_request:
    branches: [ main, dev ]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  pr-scan:
    name: AI SAST Scan on PR Changes
    runs-on: ubuntu-latest
    continue-on-error: true
    
    env:
      GOOGLE_CLOUD_PROJECT: ${{ secrets.GOOGLE_CLOUD_PROJECT }}
      GOOGLE_LOCATION: us-central1
      GEMINI_MODEL: ${{ vars.GEMINI_MODEL || 'gemini-2.0-flash-exp' }}
      AI_SAST_SEVERITY: ${{ vars.AI_SAST_SEVERITY || 'critical,high' }}
      # Optional: Store scan findings in database for analytics (default: false)
      # AI_SAST_STORE_FINDINGS: ${{ vars.AI_SAST_STORE_FINDINGS || 'false' }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        run: |
          python --version
          pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GOOGLE_CREDENTIALS }}
      
      - name: Run AI-SAST on PR Diff
        id: scan
        run: |
          echo "Running AI-SAST on PR changes only"
          python -m src.main.pr_scan
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Post PR Comment with Results
        if: always() && steps.scan.outcome != 'skipped'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            
            // Check if pr_comment.md exists
            if (!fs.existsSync('pr_comment.md')) {
              console.log('No pr_comment.md found, skipping comment');
              return;
            }
            
            // Read the markdown report
            const report = fs.readFileSync('pr_comment.md', 'utf8');
            
            // Check if there's anything to report
            if (!report || report.trim().length === 0) {
              console.log('pr_comment.md is empty, skipping comment');
              return;
            }
            
            // Post comment to PR
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: report
            });
            
            console.log('Successfully posted PR comment');
      
      - name: Upload Scan Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-sast-pr-scan-reports
          path: |
            ai_sast_pr_scan_report_*.html
            pr_comment.md
          retention-days: 30